steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/fde-blueprint-agent', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fde-blueprint-agent']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fde-blueprint-agent'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fde-blueprint-agent'
      - '--region'
      - 'us-central1'
images:
  - 'gcr.io/$PROJECT_ID/fde-blueprint-agent'
